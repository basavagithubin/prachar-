services:
  - type: web
    name: prachar
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn candidate_management.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.9
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: "*"
